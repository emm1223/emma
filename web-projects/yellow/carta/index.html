<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Una Pregunta Para Ti</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)), 
                        url('../imaganes/IMG_2505(1).HEIC') center/cover fixed no-repeat;
            font-family: Arial, sans-serif;
            padding: 20px;
            overflow: hidden;
        }

        .box {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 60px 40px;
            border-radius: 15px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
            max-width: 500px;
            width: 100%;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            animation: slideIn 0.6s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .heart {
            font-size: 50px;
            margin-bottom: 30px;
            animation: heartBeat 1.5s ease-in-out infinite;
        }

        @keyframes heartBeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        h1 {
            color: white;
            font-size: 28px;
            margin-bottom: 20px;
            font-weight: bold;
            line-height: 1.3;
        }

        .pregunta {
            color: rgba(255, 255, 255, 0.9);
            font-size: 18px;
            margin-bottom: 50px;
            line-height: 1.5;
        }

        .botones {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            padding: 15px 35px;
            font-size: 18px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            user-select: none;
            touch-action: manipulation;
        }

        .si {
            background: #ff4757;
            color: white;
        }

        @media (max-width: 768px) {
            .box {
                padding: 40px 25px;
                border-radius: 12px;
            }

            .heart {
                font-size: 40px;
                margin-bottom: 20px;
            }

            h1 {
                font-size: 24px;
                margin-bottom: 15px;
            }

            .pregunta {
                font-size: 16px;
                margin-bottom: 40px;
            }

            .botones {
                gap: 15px;
            }

            button {
                padding: 12px 30px;
                font-size: 16px;
                min-height: 44px;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 15px;
            }

            .box {
                padding: 35px 20px;
                border-radius: 10px;
            }

            .heart {
                font-size: 35px;
                margin-bottom: 15px;
            }

            h1 {
                font-size: 22px;
                margin-bottom: 12px;
            }

            .pregunta {
                font-size: 15px;
                margin-bottom: 35px;
            }

            .botones {
                gap: 12px;
            }

            button {
                padding: 12px 25px;
                font-size: 15px;
                min-height: 44px;
                flex: 1;
                min-width: 120px;
            }
        }

        @media (max-width: 380px) {
            .box {
                padding: 30px 15px;
            }

            h1 {
                font-size: 20px;
            }

            .pregunta {
                font-size: 14px;
                margin-bottom: 30px;
            }

            button {
                padding: 11px 20px;
                font-size: 14px;
            }
        }

        .si:hover {
            background: #ff3838;
            transform: scale(1.1);
        }

        .si:active {
            transform: scale(0.95);
        }

        .no {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            position: relative;
        }

        .no:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .exito {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #ff4757 0%, #ff6b9d 100%);
            z-index: 999;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .exito.mostrar {
            display: flex;
        }

        .exito h2 {
            color: white;
            font-size: 50px;
            margin-bottom: 20px;
        }

        .exito p {
            color: white;
            font-size: 20px;
        }

        .confeti {
            position: fixed;
            width: 10px;
            height: 10px;
            pointer-events: none;
        }

        .emoji {
            position: fixed;
            font-size: 40px;
            pointer-events: none;
        }

        @media (max-width: 480px) {
            body {
                background-attachment: scroll;
                height: auto;
                min-height: 100vh;
            }

            .box {
                padding: 40px 25px;
            }

            .heart {
                font-size: 40px;
                margin-bottom: 20px;
            }

            h1 {
                font-size: 24px;
                margin-bottom: 15px;
            }

            .pregunta {
                font-size: 16px;
                margin-bottom: 40px;
            }

            button {
                padding: 12px 28px;
                font-size: 16px;
                min-width: 100px;
            }

            .botones {
                gap: 15px;
            }

            .exito h2 {
                font-size: 40px;
            }

            .exito p {
                font-size: 18px;
            }

            .emoji {
                font-size: 32px;
            }
        }

        @media (max-width: 360px) {
            .box {
                padding: 30px 15px;
            }

            h1 {
                font-size: 20px;
            }

            .pregunta {
                font-size: 15px;
            }

            button {
                padding: 10px 20px;
                font-size: 15px;
            }

            .exito h2 {
                font-size: 35px;
            }
        }
    </style>

</head>
<body>
    <div class="box">
        <div class="heart">💕</div>
        <h1>¿Me darías la oportunidad de hacerte el amor?</h1>
        <div class="pregunta">
            ¿Quieres hacer esto conmigo el resto de tu vida?
        </div>
        <div class="botones">
            <button class="si" onclick="dijoSi()">Sí 💕</button>
            <button class="no" id="noBtn" onclick="intentoNo()">No</button>
        </div>
    </div>

    <div class="exito" id="exito">
        <h2>¡TE AMO! 💕</h2>
        <p>Sabía que dirías que sí ✨</p>
    </div>

    <script>
        let intentos = 0;

        function dijoSi() {
            celebrar();
        }

        function intentoNo() {
            const noBtn = document.getElementById('noBtn');
            intentos++;

            if (intentos > 3) {
                celebrar();
                return;
            }

            const x = Math.random() * 300 - 150;
            const y = Math.random() * 300 - 150;

            noBtn.style.transform = `translate(${x}px, ${y}px)`;
        }

        function celebrar() {
            const exito = document.getElementById('exito');
            exito.classList.add('mostrar');

            crearConfeti();
            crearEmojis();
            reproducirSonido();
        }

        function crearConfeti() {
            for (let i = 0; i < 50; i++) {
                setTimeout(() => {
                    const confeti = document.createElement('div');
                    confeti.classList.add('confeti');
                    confeti.style.left = Math.random() * 100 + '%';
                    confeti.style.top = '-10px';
                    confeti.style.background = ['#ff4757', '#ff6b9d', '#ffa502', '#ffd93d', '#6bcf7f'][Math.floor(Math.random() * 5)];

                    document.body.appendChild(confeti);

                    let top = 0;
                    const caida = setInterval(() => {
                        top += Math.random() * 5 + 3;
                        confeti.style.top = top + 'px';
                        if (top > window.innerHeight) {
                            clearInterval(caida);
                            confeti.remove();
                        }
                    }, 30);
                }, i * 50);
            }
        }

        function crearEmojis() {
            const emojis = ['💕', '🎉', '✨', '💑', '🌹', '💖'];
            for (let i = 0; i < 20; i++) {
                setTimeout(() => {
                    const emoji = document.createElement('div');
                    emoji.classList.add('emoji');
                    emoji.textContent = emojis[Math.floor(Math.random() * emojis.length)];
                    emoji.style.left = Math.random() * 100 + '%';
                    emoji.style.top = '-50px';

                    document.body.appendChild(emoji);

                    let top = -50;
                    const caida = setInterval(() => {
                        top += Math.random() * 4 + 2;
                        emoji.style.top = top + 'px';
                        if (top > window.innerHeight) {
                            clearInterval(caida);
                            emoji.remove();
                        }
                    }, 40);
                }, i * 100);
            }
        }

        function reproducirSonido() {
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const now = audioContext.currentTime;

            for (let nota of [800, 900, 1000]) {
                const osc = audioContext.createOscillator();
                const gain = audioContext.createGain();

                osc.connect(gain);
                gain.connect(audioContext.destination);

                osc.frequency.value = nota;
                gain.gain.setValueAtTime(0.3, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4);

                osc.start(now);
                osc.stop(now + 0.4);
                now += 0.15;
            }
        }
    </script>
</body>
</html>
