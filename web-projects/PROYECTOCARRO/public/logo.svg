<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Circle -->
  <circle cx="100" cy="100" r="95" fill="#fff5f5" stroke="#dc2626" stroke-width="2"/>
  
  <!-- Cart Body -->
  <g>
    <!-- Cart handle -->
    <path d="M 60 70 Q 100 40, 140 70" stroke="#dc2626" stroke-width="4" fill="none" stroke-linecap="round"/>
    
    <!-- Cart basket -->
    <rect x="50" y="75" width="100" height="70" rx="5" fill="none" stroke="#dc2626" stroke-width="3"/>
    
    <!-- Cart wheels -->
    <circle cx="70" cy="155" r="8" fill="none" stroke="#dc2626" stroke-width="3"/>
    <circle cx="130" cy="155" r="8" fill="none" stroke="#dc2626" stroke-width="3"/>
    
    <!-- Wheel axle -->
    <line x1="78" y1="155" x2="122" y2="155" stroke="#dc2626" stroke-width="2"/>
  </g>
  
  <!-- Food Items in Cart -->
  <g>
    <!-- Empanada 1 -->
    <ellipse cx="75" cy="110" rx="12" ry="15" fill="#f97316" opacity="0.8"/>
    <path d="M 75 95 Q 82 105, 75 125" stroke="#ea580c" stroke-width="1" fill="none"/>
    
    <!-- Empanada 2 -->
    <ellipse cx="100" cy="105" rx="12" ry="15" fill="#f97316" opacity="0.8"/>
    <path d="M 100 90 Q 107 100, 100 120" stroke="#ea580c" stroke-width="1" fill="none"/>
    
    <!-- Pastel -->
    <rect x="115" y="100" width="18" height="20" rx="2" fill="#fbbf24" opacity="0.8"/>
    <path d="M 115 100 L 124 90 L 133 100" fill="#f59e0b" opacity="0.8"/>
  </g>
  
  <!-- Accent: Gold sparkle -->
  <g>
    <circle cx="155" cy="65" r="4" fill="#d4af37"/>
    <path d="M 155 60 L 155 70 M 150 65 L 160 65" stroke="#d4af37" stroke-width="1.5" stroke-linecap="round"/>
  </g>
  
  <!-- Text -->
  <text x="100" y="175" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#dc2626">
    EL CARRITO ROJO
  </text>
</svg>
